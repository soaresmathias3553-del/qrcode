<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Instruções do Trote</title>

<style>
body{
margin:0;
background:black;
color:white;
font-family:sans-serif;
text-align:center;
}

.container{
position:relative;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

img{
width:100%;
max-width:600px;
}

.texto{
position:absolute;
top:10%;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.7);
padding:20px;
border-radius:10px;
font-size:20px;
}
</style>
</head>

<body>

<div class="container">
<img id="imagem" src="instrucao.jpg">

<div class="texto">
<h2>📜 Instruções para os Calouros</h2>
<p>
1. Leia as instruções.<br>
2. Clique em qualquer lugar para continuar.<br>
3. Não feche a página.<br>
</p>
</div>
</div>

<audio id="audio" src="gemidao.mp3"></audio>

<script>

const audio = document.getElementById("audio")
const img = document.getElementById("imagem")

function troll(){

// troca imagem instantaneamente
img.src="trollface.png"

// volume máximo
audio.volume=1

// toca áudio
audio.play().catch(()=>{})

// repete o áudio
audio.loop=true

// efeito de piscar imagem
let toggle=true
setInterval(()=>{
img.style.opacity = toggle ? "1" : "0.3"
toggle=!toggle
},200)

document.removeEventListener("click",troll)

}

document.addEventListener("click",troll)

</script>

</body>
</html>
