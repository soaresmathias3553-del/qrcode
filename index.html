<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Instruções do trote</title>

<style>
body{
  background:black;
  color:white;
  text-align:center;
  font-family:sans-serif;
  margin-top:40px;
}

img{
  width:300px;
  max-width:80%;
}

</style>
</head>

<body>

<h1>📜 Instruções do Trote</h1>

<p>
1. Leia todas as instruções<br>
2. Aguarde 5 segundos<br>
3. Não feche a página<br>
</p>

<img id="imagem" src="instrucao.jpg">

<audio id="audio" src="gemidao.mp3"></audio>

<script>

let img = document.getElementById("imagem")
let audio = document.getElementById("audio")

setTimeout(()=>{

img.src = "trollface.png"

audio.volume = 1
audio.play().catch(()=>{})

},5000)

document.addEventListener("click",()=>{
audio.play().catch(()=>{})
})

document.addEventListener("contextmenu",(e)=>{
e.preventDefault()
})

</script>

</body>
</html>
